services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: annas
      POSTGRES_USER: annas
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-annas}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./ingest/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    shm_size: 1gb
    command: >
      postgres
        -c shared_buffers=4GB
        -c effective_cache_size=8GB
        -c work_mem=256MB
        -c maintenance_work_mem=1GB
        -c max_wal_size=2GB
        -c checkpoint_completion_target=0.9
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U annas"]
      interval: 5s
      timeout: 5s
      retries: 5

  mcp-server:
    build: ./server
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://annas:${POSTGRES_PASSWORD:-annas}@postgres:5432/annas
      RATE_LIMIT: ${RATE_LIMIT:-60}
      TRANSPORT: ${TRANSPORT:-http}
      PORT: "3001"
      CACHE_DIR: /data/cache
      FILE_CACHE_MB: ${FILE_CACHE_MB:-2000}
      TEXT_CACHE_MB: ${TEXT_CACHE_MB:-500}
    volumes:
      - cache:/data/cache
    depends_on:
      postgres:
        condition: service_healthy

  ingest:
    build: ./ingest
    environment:
      DATABASE_URL: postgresql://annas:${POSTGRES_PASSWORD:-annas}@postgres:5432/annas
    volumes:
      - aac-data:/data/aac:ro
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - ingest

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - mcp-server

  download:
    build: ./downloader
    environment:
      COLLECTIONS: ${COLLECTIONS:-zlib3_records,upload_records,ia2_records,nexusstc_records}
      ANNAS_BASE_URL: ${ANNAS_BASE_URL:-annas-archive.gl}
      OUTPUT_DIR: /data/aac
      SEED_TIME: ${SEED_TIME:-0}
    volumes:
      - aac-data:/data/aac
    profiles:
      - download

volumes:
  pgdata:
  cache:
  aac-data:
