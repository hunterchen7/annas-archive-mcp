[package]
name = "annas-ingest"
version = "1.0.0"
edition = "2021"

[dependencies]
clap = { version = "4", features = ["derive"] }
glob = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tokio-postgres = "0.7"
bytes = "1"
futures-util = "0.3"
zstd = "0.13"

[profile.release]
opt-level = 3
lto = true
